# mosquitto/config/mosquitto.conf
# Mosquitto MQTT broker configuration for FarmShield.
#
# Password file setup (run once):
#   docker run --rm -v $(pwd)/mosquitto/config:/mosquitto/config eclipse-mosquitto:2 \
#     mosquitto_passwd -c -b /mosquitto/config/passwd farmshield farmshield123
#
# The username/password must match MQTT_USERNAME / MQTT_PASSWORD in .env.

listener 1883
allow_anonymous false
password_file /mosquitto/config/passwd

# Persistence
persistence true
persistence_location /mosquitto/data/

# Logging
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information
